services:
  builder:
    image: node:24
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      bash -lc "npx --yes yarn@1.22.22 install && npx --yes yarn@1.22.22 build"

  web:
    image: php:8.2-apache
    depends_on:
      - builder
    ports:
      - '8080:80'
    volumes:
      - ./www:/var/www/html
    command: >
      bash -lc "until [ -f /var/www/html/assets/app.js ]; do echo 'Waiting for webpack build...'; sleep 1; done; apache2-foreground"
    restart: unless-stopped
