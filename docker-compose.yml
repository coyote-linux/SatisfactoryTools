services:
  builder:
    image: node:24
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: >
      bash -lc "npx --yes yarn@1.22.22 install && npx --yes yarn@1.22.22 build"

  web:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on:
      - builder
    ports:
      - '8080:8080'
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      ShareStore__Root: /tmp/satisfactorytools-share-store
    command: >
      bash -lc "until [ -f /workspace/www/assets/app.js ]; do echo 'Waiting for webpack build...'; sleep 1; done; dotnet run --project SolverService/SatisfactoryTools.Solver.Api/SatisfactoryTools.Solver.Api.csproj --urls=http://0.0.0.0:8080"
    restart: unless-stopped
